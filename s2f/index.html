<!DOCTYPE html>
<html>
<head>
<title>Bitcoin S2F Calculator</title>
<link rel="stylesheet" href="../style.css">
    <meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
</head>
<body>

<h1>Bitcoin S2F Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let stock=+a.value||0;let flow=+b.value||1;res.innerText=(stock/flow).toFixed(2);} 
</script>

</body>
</html>
