<!DOCTYPE html>
<html>
<head>
<title>Bitcoin Drawdown Calculator</title>
<link rel="stylesheet" href="../style.css">
    <meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
</head>
<body>

<h1>Bitcoin Drawdown Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let peak=+a.value||0;let current=+b.value||0;res.innerText=((current-peak)/peak*100).toFixed(2)+'%';}
</script>

</body>
</html>
