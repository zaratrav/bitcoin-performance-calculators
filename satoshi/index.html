<!DOCTYPE html>
<html>
<head>
<title>Satoshi to USD Calculator</title>
<link rel="stylesheet" href="../style.css">
    <meta name="google-site-verification" content="PkLa_ViOo6FAHpvh8SacceMb95o9tePRdrqLNBz9X1M" />
</head>
<body>

<h1>Satoshi to USD Calculator</h1>

<input id="a" placeholder="Value A">
<input id="b" placeholder="Value B">

<button onclick="calc()">Calculate</button>
<p id="res"></p>

<a href="../index.html">← Back</a>

<script>
function calc(){let sats=+a.value||0;let price=+b.value||0;res.innerText='$'+(sats/100000000*price).toFixed(2);} 
</script>

</body>
</html>
